development:
  adapter: async

test:
  adapter: test

production:
  # Async adapter — fine for a single-server demo. Live Turbo Streams broadcasts
  # work as long as all browser clients hit the same Fly machine, which
  # min_machines_running = 1 keeps true. For multi-machine scale-out, switch
  # back to solid_cable with a separate cable DB.
  adapter: async
